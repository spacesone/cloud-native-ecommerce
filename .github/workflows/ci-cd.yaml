name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: olymahmudmugdho
  IMAGE_TAG: ${{ github.sha }}
  INFRA_REPO: https://github.com/spacesone/cne-k8s-manifests.git
  INFRA_BRANCH: main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, order-service, inventory-service]

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Inventory-service: Build React + make build + docker build + push
      - name: Build and Dockerize Inventory Service
        if: matrix.service == 'inventory-service'
        run: |
          echo ">> Building React frontend"
          cd inventory-frontend
          npm install
          npm run build

          echo ">> Copying dist to inventory-service/cmd/dist"
          mkdir -p ../inventory-service/cmd/dist
          cp -r dist/* ../inventory-service/cmd/dist/

          echo ">> Running make build"
          cd ../inventory-service
          make build

          echo ">> Building Docker image"
          docker build -t $DOCKER_HUB_USERNAME/inventory-service:$IMAGE_TAG .

          echo ">> Pushing Docker image"
          docker push $DOCKER_HUB_USERNAME/inventory-service:$IMAGE_TAG

      # Set up Java 21
      - name: Set up Java 21
        if: matrix.service != 'inventory-service'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # product-service or order-service: mvn package + docker build + push
      - name: Build and Dockerize Spring Boot Service
        if: matrix.service != 'inventory-service'
        run: |
          echo ">> Using Java at $JAVA_HOME"
          echo ">> Building Spring Boot JAR"
          cd ${{ matrix.service }}
          ./mvnw clean package -DskipTests

          echo ">> Building Docker image"
          docker build -t $DOCKER_HUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG .

          echo ">> Pushing Docker image"
          docker push $DOCKER_HUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG
