name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: olymahmudmugdho
  IMAGE_TAG: ${{ github.sha }}
  INFRA_REPO: https://github.com/spacesone/cne-k8s-manifests.git
  INFRA_BRANCH: main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, order-service, inventory-service]

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Inventory-service: Build React + make build + docker build + push
      - name: Build and Dockerize Inventory Service
        if: matrix.service == 'inventory-service'
        run: |
          echo ">> Building React frontend"
          cd inventory-frontend
          npm install
          npm run build

          echo ">> Copying dist to inventory-service/cmd/dist"
          mkdir -p ../inventory-service/cmd/dist
          cp -r dist/* ../inventory-service/cmd/dist/

          echo ">> Running make build"
          cd ../inventory-service
          go mod tidy
          make build

          echo ">> Building Docker image"
          docker build -t $DOCKER_HUB_USERNAME/inventory-service:$IMAGE_TAG .

          echo ">> Pushing Docker image"
          docker push $DOCKER_HUB_USERNAME/inventory-service:$IMAGE_TAG

      # Set up Java 21
      - name: Set up Java 21
        if: matrix.service != 'inventory-service'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # product-service or order-service: mvn package + docker build + push
      - name: Build and Dockerize Spring Boot Service
        if: matrix.service != 'inventory-service'
        run: |
          echo ">> Using Java at $JAVA_HOME"
          echo ">> Building Spring Boot JAR"
          cd ${{ matrix.service }}
          ./mvnw clean package -DskipTests

          echo ">> Building Docker image"
          docker build -t $DOCKER_HUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG .

          echo ">> Pushing Docker image"
          docker push $DOCKER_HUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG
    
  update-k8s-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout k8s manifest repo
        uses: actions/checkout@v4
        with:
          repository: spacesone/cne-k8s-manifests
          ref: ${{ env.INFRA_BRANCH }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.name "spacesone"
          git config --global user.email "spacesone1@proton.me"

      - name: run ls
        run: |
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in manifests
        run: |
          cd infra/k8s
          SERVICES=("product" "order" "inventory")
          for SERVICE in "${SERVICES[@]}"; do
            DEPLOY_PATH="${SERVICE}/deployment.yaml"
            echo "Updating $DEPLOY_PATH with new image tag..."
            yq -i ".spec.template.spec.containers[0].image = \"$DOCKER_HUB_USERNAME/${SERVICE}-service:$IMAGE_TAG\"" "$DEPLOY_PATH"
          done

      - name: Commit and push changes
        run: |
          cd infra
          git add k8s/*/deployment.yaml
          git commit -m "Update image tags to $IMAGE_TAG"
          git push origin $INFRA_BRANCH

