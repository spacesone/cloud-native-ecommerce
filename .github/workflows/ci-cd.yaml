name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: olymahmudmugdho
  IMAGE_TAG: ${{ github.sha }}
  INFRA_REPO: https://github.com/spacesone/cne-k8s-manifests.git
  INFRA_BRANCH: main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, order-service, inventory-service]

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Inventory-service: Build React + make build + docker build + push
      - name: Build and Dockerize Inventory Service
        if: matrix.service == 'inventory-service'
        run: |
          echo ">> Building React frontend"
          cd inventory-frontend
          npm install
          npm run build

          echo ">> Copying dist to inventory-service/cmd/dist"
          mkdir -p ../inventory-service/cmd/dist
          cp -r dist/* ../inventory-service/cmd/dist/

          echo ">> Running make build"
          cd ../inventory-service
          make build

          echo ">> Building Docker image"
          docker build -t $DOCKER_HUB_USERNAME/inventory-service:$IMAGE_TAG .

          echo ">> Pushing Docker image"
          docker push $DOCKER_HUB_USERNAME/inventory-service:$IMAGE_TAG

      # product-service or order-service: mvn package + docker build + push
      - name: Build and Dockerize Spring Boot Service
        if: matrix.service != 'inventory-service'
        run: |
          echo ">> Building Spring Boot JAR"
          cd ${{ matrix.service }}
          ./mvnw clean package -DskipTests

          echo ">> Building Docker image"
          docker build -t $DOCKER_HUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG .

          echo ">> Pushing Docker image"
          docker push $DOCKER_HUB_USERNAME/${{ matrix.service }}:$IMAGE_TAG

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: spacesone/cne-k8s-manifests
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: ${{ env.INFRA_BRANCH }}
          path: infra

      - name: Update Kubernetes manifests with new image tags
        run: |
          cd infra/k8s

          SERVICES=("product-service" "order-service" "inventory-service")

          for SERVICE in "${SERVICES[@]}"; do
            FILE="${SERVICE}-deployment.yaml"
            echo "Updating $FILE with image tag $IMAGE_TAG"
            sed -i -E "s|(image: .*/$SERVICE:).*|\1$IMAGE_TAG|" "$FILE"
          done

      - name: Commit and Push updated manifests
        run: |
          cd infra
          git config user.name "spacesone"
          git config user.email "spacesone1@proton.me"
          git add k8s/*.yaml
          git commit -m "Update image tags to $IMAGE_TAG"
          git push origin $INFRA_BRANCH
